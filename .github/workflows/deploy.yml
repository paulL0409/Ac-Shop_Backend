name: Deploy AC Shop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Build and prepare Docker image
        run: |
          docker build -t ac-shop-backend .
          docker save ac-shop-backend | gzip > ac-shop-backend.tar.gz
          ls -lh ac-shop-backend.tar.gz

      - name: Clean up old image on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            rm -f /home/ec2-user/ac-shop-backend.tar.gz
            sudo rm -f /opt/ac-shop/ac-shop-backend.tar.gz

      - name: Copy image to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key \
              -P ${{ secrets.EC2_PORT }} \
              -o StrictHostKeyChecking=no \
              ac-shop-backend.tar.gz \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/
          rm -f /tmp/deploy_key

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            sudo mkdir -p /opt/ac-shop
            sudo mv /home/ec2-user/ac-shop-backend.tar.gz /opt/ac-shop/ac-shop-backend.tar.gz
            gunzip -c /opt/ac-shop/ac-shop-backend.tar.gz | sudo docker load
            sudo docker rm -f ac-shop-backend || true
            sudo docker run -d \
            --name ac-shop-backend \
            --network ac-shop-network \
            -p 8080:8080 \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e DB_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver \
            -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            -e STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            -e REDIS_HOST=ac-shop-redis \
            -e REDIS_PORT=6379 \
            -e AWS_S3_BUCKET_NAME="${{ secrets.AWS_S3_BUCKET_NAME }}" \
            -e AWS_S3_REGION="${{ secrets.AWS_S3_REGION }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            ac-shop-backend
